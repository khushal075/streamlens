# infra/docker-compose.yml
version: '3.8'

services:

  # ------------------------------
  # Zookeeper (required for Kafka)
  # ------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: streamlens-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - streamlens-network

  # ------------------------------
  # Kafka broker
  # ------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamlens-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"       # internal container-to-container access
      - "29092:29092"     # host machine access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Listener config
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092

      # Advertise internal and host-accessible addresses
      # For macOS/Windows use host.docker.internal
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - streamlens-network

  # ------------------------------
  # Kafka-UI
  # ------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: streamlens-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: streamlens
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - streamlens-network

  # ------------------------------
  # Redis
  # ------------------------------
  redis:
    image: redis:7
    container_name: streamlens-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]  # enable persistence
    networks:
      - streamlens-network

  # ------------------------------
  # Click-house
  # ------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: streamlens-clickhouse  # Added for consistency
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - streamlens-network

# ------------------------------
# Network for all services
# ------------------------------
networks:
  streamlens-network:
    driver: bridge


volumes:
  clickhouse_data: