name: Ingestion Service CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ingestion-service/**'
      - 'common/**'
      - '.github/workflows/ingestion-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ingestion-service/**'
      - 'common/**'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ingestion-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: ingestion-service/.venv
          # Fixed path to lock file and added python version to key
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('ingestion-service/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.11-

      - name: Install Dependencies
        # Running install ensures the environment is synced with the lock file
        run: poetry install --no-interaction --no-root

      - name: Run Pytest with Coverage
        # This env block fixes the '500 == 1000' AssertionError by syncing CI with local
        env:
          BATCH_SIZE: 1000
          CLICKHOUSE_BATCH_SIZE: 1000
          ENVIRONMENT: testing
          DEBUG: "true"
        run: |
          # Enforcing 80% threshold
          poetry run pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Lint with Flake8
        run: |
          poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics