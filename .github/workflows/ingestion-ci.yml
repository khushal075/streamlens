name: Ingestion Service CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ingestion-service/**'
      - 'common/**'
      - '.github/workflows/ingestion-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ingestion-service/**'
      - 'common/**'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ingestion-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: ingestion-service/.venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('ingestion-service/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.11-

      - name: Install Dependencies
        run: poetry install --no-interaction --no-root

      - name: Run Pytest with Coverage
        env:
          BATCH_SIZE: 1000
          CLICKHOUSE_BATCH_SIZE: 1000
          ENVIRONMENT: testing
          DEBUG: "true"
        run: |
          # Added --cov-report=xml so Codecov has a file to upload
          poetry run pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Lint with Flake8
        run: |
          poetry run python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,**/__pycache__

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          # Use the secret you just added to GitHub
          token: ${{ secrets.CODECOV_TOKEN }}
          # Path to the xml file generated in the pytest step
          # Note: The path is relative to the root, but we are in ingestion-service
          files: ./ingestion-service/coverage.xml
          # Optional: helps identify this specific service in the dashboard
          flags: ingestion-service
          fail_ci_if_error: true