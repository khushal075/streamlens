name: Ingestion Service CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ingestion-service/**'
      - 'common/**'
      - '.github/workflows/ingestion-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ingestion-service/**'
      - 'common/**'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        # Ensures all commands run inside the service directory
        working-directory: ./ingestion-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: ingestion-service/.venv
          # Added python version and explicit path to lock file for better cache hits
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('ingestion-service/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.11-

      - name: Install Dependencies
        # We run install even on cache hit to ensure the environment is synced
        run: poetry install --no-interaction --no-root

      - name: Run Pytest with Coverage
        # These env vars fix the 'AssertionError: 500 == 1000'
        # and match your local .env configuration
        env:
          BATCH_SIZE: 1000
          CLICKHOUSE_BATCH_SIZE: 1000
          ENVIRONMENT: testing
          DEBUG: "true"
        run: |
          # We set the gate to 80% to match your current progress
          poetry run pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Lint with Flake8
        run: |
          # The --exclude flag ensures we don't lint our library dependencies
          poetry run python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,**/__pycache__