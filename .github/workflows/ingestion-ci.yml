name: Ingestion Service CI

on:
  push:
    branches: [ main, master ]
    # Only trigger if code in these folders changes
    paths:
      - 'ingestion-service/**'
      - 'common/**'
      - '.github/workflows/ingestion-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ingestion-service/**'
      - 'common/**'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        # This ensures all commands run inside the service subfolder
        working-directory: ./ingestion-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up future runs by caching dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Optional: Install common library if it's a local package
          # pip install ../common

      - name: Run Pytest with Coverage
        run: |
          # --cov=app points to the source code folder
          # --cov-fail-under=81 enforces our hard-won 81% threshold
          pytest --cov=app --cov-report=term-missing --cov-fail-under=81

      - name: Lint with Flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics