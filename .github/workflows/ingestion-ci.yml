name: Ingestion Service CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ingestion-service/**'
      - 'common/**'
      - '.github/workflows/ingestion-ci.yml'
  pull_request:
    paths:
      - 'ingestion-service/**'
      - 'common/**'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ingestion-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-metadata-cache: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: ingestion-service/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install Dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Run Pytest with Coverage
        run: |
          # Use 'poetry run' to execute pytest within the managed environment
          poetry run pytest --cov=app --cov-report=term-missing --cov-fail-under=81

      - name: Lint with Flake8
        run: |
          # If flake8 is in your pyproject.toml dev-dependencies:
          poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics